services:
  discord-bot:
    build: .
    container_name: alfred_js_bot
    restart: always
    working_dir: /app
    
    # 1. Environment Variables (Empty here, filled in Portainer)
    environment:
      - DISCORD_TOKEN
      - CLIENT_ID
      - FINNHUB_API_KEY
      - CAT_API_KEY
      - ALFRED_ADMIN
      - OCTOPUS_AI_URL=http://octopus-ai:4000
      - AI_CHANNEL_NAME=octopus-ai

    volumes:
      - /home/psychopathy/alfred-js/balances.db:/app/balances.db
    networks:
      - default
      - octopus_network

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
  octopus_network:
    external: true
